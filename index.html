<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technique Manifest</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        /* The Small Camera Window */
        #input_video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px; /* Adjust size for mobile */
            height: auto;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            z-index: 10;
            transform: scaleX(-1); /* Mirror view for natural feel */
            background: #111;
        }

        .ui-panel {
            position: absolute;
            bottom: 160px; /* Moved up to clear the camera window */
            text-align: center;
            width: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #status {
            color: #fff;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    
    <div class="ui-panel">
        <p id="status">AWAITING GESTURE</p>
    </div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const statusText = document.getElementById('status');

const img = {
    red: new Image(), purple: new Image(),
    blue: new Image(), raga: new Image()
};
img.red.src = 'red.png';
img.purple.src = 'purple.png';
img.blue.src = 'blue.png';
img.raga.src = 'raga.png';

function isFist(landmarks) {
    const fingerTips = [8, 12, 16, 20];
    const fingerIPs = [6, 10, 14, 18];
    let closedFingers = 0;
    for (let i = 0; i < fingerTips.length; i++) {
        if (landmarks[fingerTips[i]].y > landmarks[fingerIPs[i]].y) closedFingers++;
    }
    return closedFingers >= 3;
}

function countFingers(landmarks) {
    const tips = [8, 12, 16, 20];
    let count = 0;
    tips.forEach(tip => {
        if (landmarks[tip].y < landmarks[tip - 2].y) count++;
    });
    return count;
}

function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hands = results.multiHandLandmarks;

        if (hands.length === 2 && isFist(hands[0]) && isFist(hands[1])) {
            drawEffect(img.raga, 450);
            statusText.innerText = "With this treasure...";
        } else {
            const fingers = countFingers(hands[0]);
            if (fingers === 1) {
                drawEffect(img.blue, 220);
                statusText.innerText = "Blue";
            } else if (fingers === 2) {
                drawEffect(img.red, 220);
                statusText.innerText = "Red";
            } else if (fingers >= 4) {
                drawEffect(img.purple, 350);
                statusText.innerText = "Purple";
            }
        }
    }
    canvasCtx.restore();
}

function drawEffect(asset, size) {
    if (!asset.complete) return;
    const x = (canvasElement.width / 2) - (size / 2);
    const y = (canvasElement.height / 2) - (size / 2);
    canvasCtx.drawImage(asset, x, y, size, size);
}

const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
});
hands.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width: 640,
    height: 480,
    facingMode: "user"
});
camera.start();
</script>
</body>
</html>
