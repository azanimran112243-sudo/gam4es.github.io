<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technique Manifest</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .ui-panel {
            position: absolute;
            bottom: 40px;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        #status {
            color: #fff;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }

        /* Subtle indicator that camera is active */
        .cam-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 10px;
            height: 10px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff0000;
        }
    </style>
    <!-- MediaPipe Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <div class="cam-indicator"></div>
    <video id="input_video" style="display:none;"></video>
    <canvas id="output_canvas"></canvas>
    
    <div class="ui-panel">
        <p id="status">INITIALIZING DOMAIN...</p>
    </div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const statusText = document.getElementById('status');

// Image Assets
const img = {
    red: new Image(),
    purple: new Image(),
    blue: new Image(),
    raga: new Image()
};
img.red.src = 'red.png';
img.purple.src = 'purple.png';
img.blue.src = 'blue.png';
img.raga.src = 'raga.png';

// Check if hand is a "Fist" (Closed)
function isFist(landmarks) {
    const fingerTips = [8, 12, 16, 20]; // Index, Middle, Ring, Pinky tips
    const fingerIPs = [6, 10, 14, 18];  // Knuckle joints
    
    // If tips are lower than the knuckles, the hand is closed
    let closedFingers = 0;
    for (let i = 0; i < fingerTips.length; i++) {
        if (landmarks[fingerTips[i]].y > landmarks[fingerIPs[i]].y) {
            closedFingers++;
        }
    }
    return closedFingers >= 3; 
}

// Count extended fingers
function countFingers(landmarks) {
    const tips = [8, 12, 16, 20];
    let count = 0;
    tips.forEach(tip => {
        if (landmarks[tip].y < landmarks[tip - 2].y) count++;
    });
    return count;
}

function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hands = results.multiHandLandmarks;

        // MAHORAGA: 2 Closed Hands
        if (hands.length === 2 && isFist(hands[0]) && isFist(hands[1])) {
            drawEffect(img.raga, 500);
            statusText.innerText = "With this treasure, I summon...";
            statusText.style.color = "#00ffcc";
        } 
        // INDIVIDUAL TECHNIQUES
        else {
            const fingers = countFingers(hands[0]);
            statusText.style.color = "#fff";

            if (fingers === 1) {
                drawEffect(img.blue, 250);
                statusText.innerText = "Cursed Technique Lapse: Blue";
            } else if (fingers === 2) {
                drawEffect(img.red, 250);
                statusText.innerText = "Cursed Technique Reversal: Red";
            } else if (fingers >= 4) {
                drawEffect(img.purple, 400);
                statusText.innerText = "Hollow Technique: Purple";
            } else {
                statusText.innerText = "Ready to Manifest";
            }
        }
    } else {
        statusText.innerText = "Awaiting Gesture";
    }
    canvasCtx.restore();
}

function drawEffect(asset, size) {
    if (!asset.complete) return;
    const x = (canvasElement.width / 2) - (size / 2);
    const y = (canvasElement.height / 2) - (size / 2);
    canvasCtx.drawImage(asset, x, y, size, size);
}

const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.75,
    minTrackingConfidence: 0.75
});

hands.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width: 1280,
    height: 720
});
camera.start();
</script>

</body>
</html>
